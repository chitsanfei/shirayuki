name: Run Unit Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Pick a compatible iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          destinations="$(
            xcodebuild \
              -project Shirayuki.xcodeproj \
              -scheme Shirayuki \
              -showdestinations
          )"

          destination_line="$(
            printf '%s\n' "$destinations" \
              | grep -m 1 -E '\{ platform:iOS Simulator, .*name:iPhone '
          )"

          if [[ -z "$destination_line" ]]; then
            echo "No compatible iPhone simulator found for the Shirayuki scheme."
            printf '%s\n' "$destinations"
            exit 1
          fi

          device_id="$(
            printf '%s\n' "$destination_line" \
              | sed -E 's/.*id:([^,}]+).*/\1/' \
              | tr -d ' '
          )"

          if [[ -z "$device_id" ]]; then
            echo "Failed to parse a compatible simulator destination."
            printf '%s\n' "$destinations"
            exit 1
          fi

          echo "Using simulator destination: $destination_line"
          echo "destination=platform=iOS Simulator,id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -euo pipefail
          derived_data_path="$RUNNER_TEMP/DerivedData"
          result_bundle_path="$GITHUB_WORKSPACE/ShirayukiTests.xcresult"

          rm -rf "$derived_data_path" "$result_bundle_path"

          xcodebuild \
            -project Shirayuki.xcodeproj \
            -scheme Shirayuki \
            -configuration Debug \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -derivedDataPath "$derived_data_path" \
            -resultBundlePath "$result_bundle_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Shirayuki-unit-tests-xcresult
          path: ShirayukiTests.xcresult
          if-no-files-found: ignore
