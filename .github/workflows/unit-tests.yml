name: Run Unit Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Pick iPhone simulator
        id: simulator
        run: |
          set -euo pipefail

          preferred_models=(
            "iPhone 17"
            "iPhone 16"
            "iPhone 15"
          )

          destinations="$(
            xcodebuild \
              -project Shirayuki.xcodeproj \
              -scheme Shirayuki \
              -showdestinations
          )"

          destination_line=""
          selected_model=""

          for model in "${preferred_models[@]}"; do
            candidate="$(
              printf '%s\n' "$destinations" \
                | grep -m 1 "name:${model}" || true
            )"

            if [[ -n "$candidate" ]]; then
              destination_line="$candidate"
              selected_model="$model"
              break
            fi
          done

          if [[ -n "$destination_line" ]]; then
            device_id="$(
              printf '%s\n' "$destination_line" \
                | sed -E 's/.*id:([^,}]+).*/\1/' \
                | tr -d ' '
            )"

            if [[ -z "$device_id" ]]; then
              echo "Failed to parse a compatible simulator destination."
              printf '%s\n' "$destinations"
              exit 1
            fi

            echo "Using existing simulator destination: $destination_line"
            echo "destination=platform=iOS Simulator,id=$device_id" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No pre-created iPhone 15/16/17 simulator found in scheme destinations."
          echo "Falling back to creating a simulator via simctl."
          printf '%s\n' "$destinations"

          simctl_list_json="$(xcrun simctl list -j devicetypes runtimes)"

          device_type_id=""
          for model in "${preferred_models[@]}"; do
            candidate="$(
              printf '%s' "$simctl_list_json" \
                | /usr/bin/ruby -rjson -e '
                    payload = JSON.parse(STDIN.read)
                    model = ARGV[0]
                    type = payload.fetch("devicetypes", []).find { |item| item["name"] == model }
                    puts(type["identifier"]) if type && type["identifier"]
                  ' "$model"
            )"

            if [[ -n "$candidate" ]]; then
              device_type_id="$candidate"
              selected_model="$model"
              break
            fi
          done

          if [[ -z "$device_type_id" || -z "$selected_model" ]]; then
            echo "No compatible iPhone 15/16/17 device type is available in this runner image."
            printf '%s' "$simctl_list_json" \
              | /usr/bin/ruby -rjson -e '
                  payload = JSON.parse(STDIN.read)
                  payload.fetch("devicetypes", []).each { |item| puts item["name"] }
                '
            exit 1
          fi

          runtime_id="$(
            printf '%s' "$simctl_list_json" \
              | /usr/bin/ruby -rjson -e '
                  payload = JSON.parse(STDIN.read)
                  runtimes = payload.fetch("runtimes", []).select do |item|
                    item["isAvailable"] == true && item["name"].to_s.start_with?("iOS")
                  end
                  runtime = runtimes.max_by { |item| item["version"].to_s }
                  puts(runtime["identifier"]) if runtime && runtime["identifier"]
                '
          )"

          if [[ -z "$runtime_id" ]]; then
            echo "No available iOS simulator runtime was found for the selected Xcode."
            printf '%s' "$simctl_list_json" \
              | /usr/bin/ruby -rjson -e '
                  payload = JSON.parse(STDIN.read)
                  payload.fetch("runtimes", []).each do |item|
                    puts "#{item["name"]} | #{item["identifier"]} | available=#{item["isAvailable"]}"
                  end
                '
            exit 1
          fi

          simulator_name="Shirayuki CI ${selected_model}"
          device_id="$(
            xcrun simctl create "$simulator_name" "$device_type_id" "$runtime_id"
          )"

          if [[ -z "$device_id" ]]; then
            echo "Failed to create simulator ${simulator_name}."
            exit 1
          fi

          xcrun simctl boot "$device_id" || true
          xcrun simctl bootstatus "$device_id" -b || true

          echo "Created simulator ${simulator_name} with runtime ${runtime_id}: ${device_id}"
          echo "destination=platform=iOS Simulator,id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -euo pipefail
          derived_data_path="$RUNNER_TEMP/DerivedData"
          result_bundle_path="$GITHUB_WORKSPACE/ShirayukiTests.xcresult"

          rm -rf "$derived_data_path" "$result_bundle_path"

          xcodebuild \
            -project Shirayuki.xcodeproj \
            -scheme Shirayuki \
            -configuration Debug \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -derivedDataPath "$derived_data_path" \
            -resultBundlePath "$result_bundle_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Shirayuki-unit-tests-xcresult
          path: ShirayukiTests.xcresult
          if-no-files-found: ignore
