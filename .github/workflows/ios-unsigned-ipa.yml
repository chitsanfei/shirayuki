name: Build iOS Unsigned IPA

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Archive unsigned app
        run: |
          set -euo pipefail
          app_name="Shirayuki"
          derived_data_path="$RUNNER_TEMP/DerivedData"
          archive_path="$RUNNER_TEMP/Shirayuki.xcarchive"
          export_path="$RUNNER_TEMP/ShirayukiExport"

          rm -rf "$derived_data_path" "$archive_path" "$export_path"

          xcodebuild \
            -project Shirayuki.xcodeproj \
            -scheme Shirayuki \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$derived_data_path" \
            -archivePath "$archive_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            clean archive

          echo "APP_NAME=$app_name" >> "$GITHUB_ENV"
          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$export_path" >> "$GITHUB_ENV"

      - name: Package IPA artifact
        run: |
          set -euo pipefail
          mkdir -p "$EXPORT_PATH/Payload"
          cp -R "$ARCHIVE_PATH/Products/Applications/$APP_NAME.app" "$EXPORT_PATH/Payload/"
          (
            cd "$EXPORT_PATH"
            /usr/bin/zip -qry "$GITHUB_WORKSPACE/$APP_NAME-unsigned.ipa" Payload
          )

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Shirayuki-unsigned-ipa
          path: Shirayuki-unsigned.ipa
          if-no-files-found: error
